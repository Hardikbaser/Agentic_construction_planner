<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Construction Planner Agent</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

  <header>
    <h1>🏗️ Construction Planner Agent</h1>
    <p>AI-powered planning & scheduling system</p>
  </header>

  <div class="card input-card">
    <input id="goalInput" placeholder="Enter your construction goal..." />
    
    <div class="buttons">
      <button onclick="generatePlan()">Generate Plan</button>
      <button class="secondary" onclick="generateSchedule()">Generate Schedule</button>
    </div>
  </div>

  <div id="loading" class="loading hidden">
    ⏳ AI is thinking...
  </div>

  <div class="grid">

    <div class="card">
      <h2>📋 Plan</h2>
      <pre id="planOutput">Your plan will appear here...</pre>
    </div>

    <div class="card">
      <h2>📅 Schedule</h2>
      <pre id="scheduleOutput">Your schedule will appear here...</pre>
    </div>

  </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
